format = """
[в•ӯв”ҖоӮ¶](#3B4252)\
$username\
[оӮ°](bg:#434C5E fg:#3B4252)\
$directory\
[оӮ°](fg:#434C5E bg:#4C566A)\
$git_branch\
$git_status\
[оӮ°](fg:#4C566A bg:#86BBD8)\
$c\
$python\
$golang\
$nodejs\
$rust\
[оӮ°](fg:#86BBD8 bg:#06969A)\
$docker_context\
$shell\
[оӮ°](fg:#06969A bg:#33658A)\
$time\
[оӮҙ](fg:#33658A)\
\n\
[в•°в”ҖвқҜ ](#3B4252)
"""

command_timeout = 5000
# Disable the blank line at the start of the prompt
# add_newline = false

# You can also replace your username with a neat symbol like п„  to save some space
[username]
show_always = true
style_user = "bg:#3B4252"
style_root = "bg:#3B4252"
format = '[$user ]($style)'

[directory]
style = "bg:#434C5E"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "пңҳ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
# Keep in mind that the order matters. For example:
# "Important Documents" = " пңҳп„Ә "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important пңҳ " = " пңҳп„Ә "

[c]
symbol = "оҳһ "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = "пҢҲ "
style = "bg:#06969A"
format = '[ $symbol $context ]($style) $path'

[shell]
disabled = false
style = "bg:#06969A"
fish_indicator = "fish"
powershell_indicator = "п’ү"
format = '[$symbol$shlvl]($style)'

[git_branch]
symbol = "п„“"
style = "bg:#4C566A"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#4C566A "
format = '[$all_status$ahead_behind ]($style)'

[golang]
symbol = "оҳ§ "
style = "bg:#86BBD8 fg:#000000"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:#86BBD8 fg:#000000"
format = '[ $symbol ($version) ]($style)'

[python]
style = "bg:#3B4252"
format = '[(\($virtualenv\) )]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#86BBD8 fg:#000000"
format = '[ $symbol ($version) ]($style)'

[time]
disabled = false
time_format = "%I:%M %p"     # Hour:Minute Format
style = "bg:#33658A"
format = '[ $time ]($style)'
