customCommands:
  - key: "C"
    command: "git cz"
    description: "commit with commitizen"
    context: "files"
    loadingText: "opening commitizen commit tool"
    subprocess: true

  - key: "E"
    command: "gh repo create"
    description: "Create GitHub Repository"
    context: "files"
    loadingText: "Loading..."
    subprocess: true

  - key: "<c-p>"
    context: "localBranches"
    command: "!git remote | xargs -L1 git push --all"
    description: "Push to all present remote repository"
    loadingText: "Pushing to all remote repos"
    subprocess: true

  - key: "<c-x>"
    context: "localBranches"
    command: "!git remote | xargs -L1 git pull --all"
    description: "Pull from all present remote repository"
    loadingText: "Pulling from all remote repos"

gui:
  nerdFontsVersion: "3"
  theme:
    activeBorderColor:
      - "#ff966c"
      - "bold"
    inactiveBorderColor:
      - "#589ed7"
    searchingActiveBorderColor:
      - "#ff966c"
      - "bold"
    optionsTextColor:
      - "#82aaff"
    selectedLineBgColor:
      - "#2d3f76"
    cherryPickedCommitFgColor:
      - "#82aaff"
    cherryPickedCommitBgColor:
      - "#c099ff"
    markedBaseCommitFgColor:
      - "#82aaff"
    markedBaseCommitBgColor:
      - "#ffc777"
    unstagedChangesColor:
      - "#c53b53"
    defaultFgColor:
      - "#c8d3f5"
